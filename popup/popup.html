<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube Shorts Blocker</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <section class="card" aria-label="Blocker controls">
        <img
          id="stateIcon"
          class="state-icon"
          src="youtube-shorts-blocker-disabled.png"
          alt=""
          width="32"
          height="32"
        />
        <div class="copy">
          <h1>YouTube Shorts Blocker</h1>
          <p id="statusText" class="status"></p>
        </div>
      </section>
      <label class="toggle-row" for="isActive">
        <span class="toggle-label">Block shorts</span>
        <span class="toggle">
          <input id="isActive" type="checkbox" />
          <span class="toggle-track" aria-hidden="true"></span>
        </span>
      </label>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
